<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Personal Productivity Dashboard — tasks, pomodoro timer, and notes in one place." />
    <title>Focus — Personal Productivity Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>

<body>

    <div id="app">

        <!-- =====================================================================
       Header Bar
       ===================================================================== -->
        <header class="app-header" role="banner">
            <div class="app-header__brand">
                <h1 class="app-header__title">Focus</h1>
                <span class="app-header__subtitle">Productivity Dashboard</span>
            </div>

            <div class="app-header__controls">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"
                    title="Toggle dark/light mode">
                    <span class="theme-toggle__icon" aria-hidden="true">☀</span>
                    <span class="theme-toggle__label">Theme</span>
                </button>
            </div>
        </header>

        <!-- =====================================================================
       Main Content
       ===================================================================== -->
        <main class="app-main" role="main">

            <!-- Daily Quote -->
            <div id="quote-container" style="margin-bottom: var(--space-5);" aria-live="polite">
                <blockquote class="quote-block">
                    <p class="quote-block__loading" id="quote-text">Loading quote…</p>
                </blockquote>
            </div>

            <!-- Dashboard Grid -->
            <div class="dashboard-grid">

                <!-- ===== TASKS WIDGET ===== -->
                <section class="widget widget--tasks" aria-labelledby="tasks-heading">
                    <div class="widget__header">
                        <h2 class="widget__title" id="tasks-heading">Tasks</h2>
                        <span class="widget-badge" id="task-count-badge" aria-label="Task count">0</span>
                    </div>

                    <!-- Task Input Form -->
                    <div class="widget__body" style="padding-bottom: 0;">
                        <form class="task-form" id="task-form" novalidate>
                            <div class="task-form__primary">
                                <label class="sr-only" for="task-input">New task</label>
                                <input type="text" id="task-input" class="form-input" placeholder="Add a new task…"
                                    autocomplete="off" maxlength="200" required />
                                <button type="submit" class="btn btn--primary" id="task-add-btn">
                                    Add
                                </button>
                            </div>
                            <div class="task-form__meta">
                                <label class="sr-only" for="task-priority">Priority</label>
                                <select id="task-priority" class="form-select" style="width: 130px;">
                                    <option value="medium">⚡ Medium</option>
                                    <option value="high">🔴 High</option>
                                    <option value="low">🟢 Low</option>
                                </select>

                                <label class="sr-only" for="task-due-date">Due date</label>
                                <input type="date" id="task-due-date" class="form-input"
                                    aria-label="Due date (optional)" />
                            </div>
                        </form>
                    </div>

                    <!-- Filter Tabs -->
                    <nav class="task-filters" role="tablist" aria-label="Task filters">
                        <button class="filter-tab filter-tab--active" data-filter="all" role="tab" aria-selected="true"
                            id="filter-all">All</button>
                        <button class="filter-tab" data-filter="active" role="tab" aria-selected="false"
                            id="filter-active">Active</button>
                        <button class="filter-tab" data-filter="done" role="tab" aria-selected="false"
                            id="filter-done">Done</button>
                    </nav>

                    <!-- Task List -->
                    <ul class="task-list" id="task-list" role="list" aria-label="Task list" aria-live="polite">
                        <!-- Tasks rendered by tasks.js -->
                    </ul>
                </section>

                <!-- ===== POMODORO TIMER WIDGET ===== -->
                <section class="widget widget--timer" aria-labelledby="timer-heading">
                    <div class="widget__header">
                        <h2 class="widget__title" id="timer-heading">Pomodoro</h2>
                        <span class="widget-badge" id="session-count-badge" aria-label="Sessions completed">0</span>
                    </div>

                    <div class="widget__body">
                        <div class="timer-widget">

                            <!-- Mode label -->
                            <p class="timer-mode timer-mode--work" id="timer-mode-label" aria-live="polite">
                                Work Session
                            </p>

                            <!-- Circular ring display -->
                            <div class="timer-ring-container" role="timer" aria-label="Pomodoro timer">
                                <svg class="timer-svg" viewBox="0 0 180 180" aria-hidden="true" focusable="false">
                                    <!-- Background track -->
                                    <circle class="timer-ring-bg" cx="90" cy="90" r="80" />
                                    <!-- Progress arc -->
                                    <circle class="timer-ring-progress" id="timer-ring-progress" cx="90" cy="90"
                                        r="80" />
                                </svg>

                                <div class="timer-display">
                                    <span class="timer-time" id="timer-display" aria-live="off">25:00</span>
                                </div>
                            </div>

                            <!-- Controls -->
                            <div class="timer-controls">
                                <button id="timer-start" class="btn btn--primary timer-btn"
                                    aria-label="Start timer">Start</button>
                                <button id="timer-reset" class="btn btn--secondary timer-btn"
                                    aria-label="Reset timer">Reset</button>
                            </div>

                            <!-- Session pips -->
                            <div class="timer-sessions">
                                <span class="timer-sessions__label">Sessions today</span>
                                <div class="timer-sessions__pips" id="session-pips" aria-label="Session pips">
                                    <!-- Pips rendered by timer.js -->
                                </div>
                            </div>

                        </div>
                    </div>
                </section>

                <!-- ===== NOTES WIDGET ===== -->
                <section class="widget widget--notes" aria-labelledby="notes-heading">
                    <div class="widget__header">
                        <h2 class="widget__title" id="notes-heading">Notes</h2>
                    </div>

                    <div class="widget__body">
                        <label class="sr-only" for="notes-area">Freeform notes</label>
                        <textarea id="notes-area" class="notes-textarea"
                            placeholder="Capture your thoughts, ideas, or anything on your mind…"
                            aria-label="Freeform notes — auto-saved" spellcheck="true"></textarea>
                        <div class="notes-footer">
                            <span class="notes-word-count" id="notes-word-count" aria-live="polite">0 words</span>
                            <span class="notes-saved-indicator" id="notes-saved-indicator" aria-live="polite">
                                ✓ Saved
                            </span>
                        </div>
                    </div>
                </section>

                <!-- ===== STATS WIDGET ===== -->
                <section class="widget widget--stats" aria-labelledby="stats-heading">
                    <div class="widget__header">
                        <h2 class="widget__title" id="stats-heading">Today</h2>
                    </div>

                    <div class="widget__body">
                        <div class="stats-grid">
                            <div class="stat-card stat-card--accent">
                                <span class="stat-card__value" id="stat-tasks-completed">0</span>
                                <span class="stat-card__label">Tasks done</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-card__value" id="stat-pomodoros">0</span>
                                <span class="stat-card__label">Pomodoros</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-card__value" id="stat-focus-time">0m</span>
                                <span class="stat-card__label">Focus time</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-card__value" id="stat-tasks-active">0</span>
                                <span class="stat-card__label">Active tasks</span>
                            </div>
                        </div>
                    </div>
                </section>

            </div><!-- /.dashboard-grid -->
        </main><!-- /.app-main -->

    </div><!-- /#app -->

    <!-- =====================================================================
     JavaScript — order matters: modules before entry point
     ===================================================================== -->
    <script src="js/tasks.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/notes.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
